<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarp's SSH PubKeys</title>
    <style>
        :root {
            --bg: #f3f3f3;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #1a1a1a;
            --accent: #0078d4;
            --copy-btn-bg: #005a9e;
            --border: rgba(0, 0, 0, 0.1);
            --code-bg: #fdfdfd;
            --footer-text: #5d5d5d;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #202020;
                --card-bg: rgba(45, 45, 45, 0.7);
                --text: #ffffff;
                --accent: #60cdff;
                --copy-btn-bg: #0067b8;
                --border: rgba(255, 255, 255, 0.1);
                --code-bg: #1c1c1c;
                --footer-text: #a0a0a0;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI Variable Text", "Segoe UI", "Inter", -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100svh;
            padding: clamp(1rem, 3.2vw, 2rem) 1rem;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            isolation: isolate;
        }

        .bubbles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
            display: block;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            left: var(--bubble-left-offset);
            bottom: -75vh;
            width: var(--bubble-radius);
            height: var(--bubble-radius);
            border-radius: 50%;
            animation: float-up var(--bubble-float-duration) var(--bubble-float-delay) ease-in infinite;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .bubble::before {
            position: absolute;
            content: "";
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: hsla(208, 94%, 76%, 0.3);
            border-radius: inherit;
            animation: var(--bubble-sway-type) var(--bubble-sway-duration) var(--bubble-sway-delay) ease-in-out alternate infinite;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(190%);
            -webkit-backdrop-filter: blur(25px) saturate(190%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: min(560px, 100%);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
            user-select: none;
            -webkit-user-select: none;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.85;
            margin-bottom: 2rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .copy-box {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            column-gap: 12px;
            row-gap: 8px;
            padding: 10px 14px;
            margin-bottom: 2rem;
            position: relative;
        }

        code {
            font-family: "Cascadia Code", "JetBrains Mono", "Fira Code", monospace;
            font-size: 0.9rem;
            flex: 1 1 13rem;
            min-width: 0;
            display: block;
            text-align: left;
            color: var(--accent);
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        code::-webkit-scrollbar {
            height: 8px;
        }

        code::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.22);
            border-radius: 999px;
        }

        code::-webkit-scrollbar-track {
            background: transparent;
        }

        .copy-btn {
            background: var(--copy-btn-bg);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: auto;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
        }

        .copy-box.is-wrapped .copy-btn {
            width: 100%;
            margin-left: 0;
        }

        .copy-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .footer > * + * {
            position: relative;
        }

        .footer > * + *::before {
            content: "";
            position: absolute;
            left: -1rem;
            top: 50%;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--footer-text);
            opacity: 0.8;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .footer a {
            color: var(--footer-text);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
        }

        .footer a:hover {
            color: var(--accent);
        }

        .footer-copy-btn {
            background: none;
            border: none;
            color: var(--footer-text);
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            user-select: none;
            -webkit-user-select: none;
        }

        .footer-copy-btn:hover {
            color: var(--accent);
        }

        .footer-copy-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .footer a svg {
            width: 14px;
            height: 14px;
        }

        .icon-mask {
            width: 14px;
            height: 14px;
            display: inline-block;
            flex-shrink: 0;
            background-color: currentColor;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            mask-size: contain;
        }

        .icon-preview {
            -webkit-mask-image: url('resources/visibility_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
            mask-image: url('resources/visibility_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
        }

        .icon-launch {
            -webkit-mask-image: url('resources/rocket_launch_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
            mask-image: url('resources/rocket_launch_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
        }

        .icon-copy {
            -webkit-mask-image: url('resources/content_copy_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
            mask-image: url('resources/content_copy_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg');
        }

        .footer-copy-btn svg {
            width: 14px;
            height: 14px;
        }

        @keyframes float-up {
            to {
                transform: translateY(-175vh);
            }
        }

        @keyframes sway-left-to-right {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100%);
            }
        }

        @keyframes sway-right-to-left {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(-100%);
            }
        }

        .container {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 560px) {
            body {
                padding: 0;
                align-items: center;
            }

            .bubbles {
                display: none;
            }

            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                width: 100%;
                max-width: none;
                min-height: 100svh;
                border-radius: 0;
                border: none;
                box-shadow: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background: var(--bg);
                padding: 1.5rem 1rem;
            }

            .footer {
                flex-wrap: wrap;
                gap: 1.5rem;
            }

            .footer > * + *::before {
                content: none;
            }

            h1 {
                font-size: 1.45rem;
            }

            p {
                margin-bottom: 1.35rem;
            }

            .footer {
                flex-wrap: wrap;
                gap: 1rem;
            }
        }

        @media (max-width: 400px) {
            body {
                align-items: flex-start;
            }

            .container {
                padding: 1.2rem 0.9rem;
            }

            h1 {
                font-size: 1.35rem;
            }

            p {
                margin-bottom: 1rem;
            }

            .copy-box {
                margin-bottom: 1rem;
            }

            code {
                font-size: 0.82rem;
            }

            .footer {
                flex-direction: column;
                gap: 0.85rem;
                margin-top: 0.75rem;
                padding-top: 1rem;
            }
        }
    </style>
</head>

    <div class="container">
        <h1>Install SSH Public Keys</h1>
        <p>Run the command below to append keys to your local list.</p>

        <div class="copy-box">
            <code id="cmd">curl -sL ssh.sarpegilmez.net/setup | bash</code>
            <button class="copy-btn" id="copyBtn" type="button" onclick="copyCommand()">
                <span class="icon-mask icon-copy" aria-hidden="true"></span>
                <span id="copyBtnText">Copy</span>
            </button>
        </div>

        <div class="footer">
            <a href="https://raw.githubusercontent.com/Segilmez06/ssh/refs/heads/main/keys" target="_blank">
                <span class="icon-mask icon-preview" aria-hidden="true"></span>
                Preview Keys
            </a>
            <a href="https://github.com/Segilmez06/ssh" target="_blank">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                GitHub Repo
            </a>
            <button class="footer-copy-btn" id="copyLaunchBtn" type="button" onclick="copyLaunchScript()">
                <span class="icon-mask icon-launch" aria-hidden="true"></span>
                <span id="copyLaunchText">Copy Launch Script</span>
            </button>
        </div>
    </div>

    <script>
        function updateCopyButtonWrapState() {
            const copyBox = document.querySelector('.copy-box');
            const codeBlock = document.getElementById('cmd');
            const copyBtn = document.getElementById('copyBtn');

            if (!copyBox || !codeBlock || !copyBtn) {
                return;
            }

            // Measure with natural inline button size first so wrapped mode can recover.
            copyBox.classList.remove('is-wrapped');

            const isNaturallyWrapped = copyBtn.offsetTop > codeBlock.offsetTop + 1;
            const isCodeOverflowing = codeBlock.scrollWidth > codeBlock.clientWidth + 2;
            const minInlineCodeWidth = 250;
            const inlineGap = 12;
            const availableInlineCodeWidth = copyBox.clientWidth - copyBtn.offsetWidth - inlineGap;
            const shouldWrapEarly = availableInlineCodeWidth < minInlineCodeWidth;

            copyBox.classList.toggle('is-wrapped', isNaturallyWrapped || isCodeOverflowing || shouldWrapEarly);
        }

        function copyCommand() {
            const text = document.getElementById('cmd').innerText;
            const btn = document.getElementById('copyBtn');
            const label = document.getElementById('copyBtnText');
            
            // Fallback for environments where navigator.clipboard might be restricted
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                label.innerText = 'Copied!';
                btn.style.background = '#28a745';
                updateCopyButtonWrapState();
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            
            document.body.removeChild(textArea);

            setTimeout(() => {
                label.innerText = 'Copy';
                btn.style.background = '';
                updateCopyButtonWrapState();
            }, 2000);
        }

        function copyLaunchScript() {
            const launchCommand = 'curl -sL ssh.sarpegilmez.net/launch | bash';
            const btn = document.getElementById('copyLaunchBtn');
            const label = document.getElementById('copyLaunchText');

            // Fallback for environments where navigator.clipboard might be restricted
            const textArea = document.createElement("textarea");
            textArea.value = launchCommand;
            document.body.appendChild(textArea);
            textArea.select();

            try {
                document.execCommand('copy');
                label.innerText = 'Copied!';
                btn.style.color = '#28a745';
            } catch (err) {
                console.error('Fallback: Oops, unable to copy launch command', err);
            }

            document.body.removeChild(textArea);

            setTimeout(() => {
                label.innerText = 'Copy Launch Script';
                btn.style.color = '';
            }, 2000);
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function initializeBubbles() {
            const bubblesContainer = document.querySelector('.bubbles');

            if (!bubblesContainer) {
                return;
            }

            if (window.matchMedia('(max-width: 560px)').matches) {
                bubblesContainer.style.display = 'none';
                return;
            }

            bubblesContainer.style.display = '';

            const bubbles = bubblesContainer.querySelectorAll('.bubble');

            if (!bubbles.length) {
                return;
            }

            bubbles.forEach((bubble) => {
                bubble.style.setProperty('--bubble-left-offset', `${randomRange(0, 100).toFixed(2)}vw`);
                bubble.style.setProperty('--bubble-radius', `${randomRange(1, 10).toFixed(2)}vw`);
                bubble.style.setProperty('--bubble-float-duration', `${randomRange(6, 12).toFixed(2)}s`);
                bubble.style.setProperty('--bubble-sway-duration', `${randomRange(4, 6).toFixed(2)}s`);
                bubble.style.setProperty('--bubble-float-delay', `${randomRange(0, 4).toFixed(2)}s`);
                bubble.style.setProperty('--bubble-sway-delay', `${randomRange(0, 4).toFixed(2)}s`);
                bubble.style.setProperty('--bubble-sway-type', Math.random() > 0.5 ? 'sway-left-to-right' : 'sway-right-to-left');
            });
        }

        window.addEventListener('resize', () => {
            updateCopyButtonWrapState();
            initializeBubbles();
        });

        window.addEventListener('orientationchange', () => {
            updateCopyButtonWrapState();
            initializeBubbles();
        });

        window.addEventListener('load', () => {
            updateCopyButtonWrapState();
            initializeBubbles();
        });

        updateCopyButtonWrapState();
        initializeBubbles();
    </script>
